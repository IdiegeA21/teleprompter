<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Teleprompter</title>

<style>
  :root {
    --bg: #0b0d0c;
    --panel: #14171a;
    --line: #262b2e;
    --dim: #4a5054;
    --read: #e8ecee;
    --current: #3ddc97;
    --accent: #ffb454;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--read);
    font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ---------- controls ---------- */
  #controls {
    padding: 14px 18px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    display: flex;
    gap: 12px;
    align-items: flex-start;
    flex-wrap: wrap;
    transition: transform 0.3s ease, opacity 0.3s ease;
    z-index: 20;
  }

  #controls.hidden {
    transform: translateY(-100%);
    opacity: 0;
    pointer-events: none;
    position: absolute;
    width: 100%;
  }

  textarea {
    flex: 1;
    min-width: 260px;
    height: 90px;
    resize: vertical;
    background: #1c2023;
    color: var(--read);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 14px;
    line-height: 1.4;
  }

  .btn-col {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 130px;
  }

  button {
    padding: 9px 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #1c2023;
    color: var(--read);
    letter-spacing: 0.2px;
  }

  button:hover { border-color: var(--accent); color: var(--accent); }

  #loadBtn {
    background: var(--current);
    border-color: var(--current);
    color: #08130d;
  }

  #loadBtn:hover { filter: brightness(1.08); color: #08130d; }

  #status {
    font-size: 12px;
    color: var(--dim);
    line-height: 1.5;
  }

  /* ---------- viewer ---------- */
  #viewer {
    flex: 1;
    position: relative;
    display: flex;
    justify-content: center;
  }

  #speedTag {
    position: absolute;
    top: 22px;
    right: 28px;
    font-size: 13px;
    color: var(--accent);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    padding: 4px 10px;
    border-radius: 999px;
    z-index: 10;
  }

  #hint {
    position: absolute;
    top: 22px;
    left: 28px;
    font-size: 12px;
    color: var(--dim);
    z-index: 10;
  }

  #progress {
    position: absolute;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    color: var(--dim);
    letter-spacing: 0.5px;
    z-index: 10;
  }

  /* ---------- lyrics scroller ---------- */
  #lyricsViewport {
    position: relative;
    width: 100%;
    max-width: 1300px;
    height: 100%;
    overflow: hidden;
    -webkit-mask-image: linear-gradient(to bottom,
      transparent 0%, black 22%, black 78%, transparent 100%);
    mask-image: linear-gradient(to bottom,
      transparent 0%, black 22%, black 78%, transparent 100%);
  }

  #lyricsTrack {
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    will-change: transform;
  }

  .lyric-line {
    height: var(--row-height, 130px);
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    align-content: center;
    gap: 0.28em 0.55em;
    text-align: center;
    padding: 0 8vw;
    font-weight: 600;
    line-height: 1.35;
    cursor: pointer;
    transition: opacity 0.45s ease, filter 0.45s ease, transform 0.45s ease;
  }

  .lyric-line:hover:not(.active) {
    opacity: 0.75 !important;
  }

  .lyric-line .word { color: var(--dim); transition: color 0.15s ease; }
  .lyric-line .word.read { color: var(--read); }
  .lyric-line .word.current { color: var(--current); }

  .lyric-line.active {
    font-size: clamp(28px, 4.6vw, 62px);
    color: var(--read);
    opacity: 1;
    transform: scale(1);
  }

  .lyric-line.near {
    font-size: clamp(18px, 2.6vw, 34px);
    color: var(--dim);
    opacity: 0.5;
    transform: scale(0.97);
  }

  .lyric-line.far {
    font-size: clamp(15px, 2vw, 26px);
    color: var(--dim);
    opacity: 0.22;
    filter: blur(0.4px);
    transform: scale(0.95);
  }

  .lyric-line.hidden-line {
    opacity: 0;
  }

  .lyric-line.lyric-end {
    color: var(--current);
  }
</style>
</head>
<body>

  <div id="controls">
    <textarea id="scriptInput" spellcheck="false"></textarea>
    <div class="btn-col">
      <button id="loadBtn" onclick="loadFromTextarea()">Load Script</button>
      <button onclick="toggleControls()">Hide panel (C)</button>
      <div id="status">Space: play/pause &middot; ↑/↓: speed &middot; ←/→: jump line &middot; click any line: jump there &middot; F: fullscreen &middot; C: toggle panel</div>
    </div>
  </div>

  <div id="viewer">
    <div id="hint">C to show/hide panel</div>
    <div id="speedTag">170 wpm</div>
    <div id="lyricsViewport">
      <div id="lyricsTrack"></div>
    </div>
    <div id="progress"></div>
  </div>

</body>
</html>
